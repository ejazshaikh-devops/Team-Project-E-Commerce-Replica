# ── HOW TO CREATE THIS SECRET ──────────────────────────────
# After terraform apply, get the RDS endpoint from outputs:
#   terraform output rds_endpoint
#
# Then create the secret:
#   kubectl create secret generic ae-secrets \
#     --namespace=abhi-ejaz \
#     --from-literal=DB_HOST=<rds_endpoint_from_terraform> \
#     --from-literal=DB_PORT=3306 \
#     --from-literal=DB_USER=abhi_ejaz \
#     --from-literal=DB_PASSWORD=YourStrongPassword@2024 \
#     --from-literal=DB_NAME=abhi_ejaz_shop \
#     --from-literal=JWT_SECRET=AbhiEjazJWTSuperSecret2024ChangeThis
#
# OR apply this file after replacing the base64 values below.
# Generate base64: echo -n "your-value" | base64
# ────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: ae-secrets
  namespace: abhi-ejaz
type: Opaque
data:
  # Replace ALL values below with: echo -n "actual-value" | base64
  DB_HOST:     UEFHU0VfUkRTX0VORFBPSU5UX0hFUkU=   # PASTE_RDS_ENDPOINT_HERE
  DB_PORT:     MzMwNg==                              # 3306
  DB_USER:     YWJoaV9lamF6                          # abhi_ejaz
  DB_PASSWORD: WW91clN0cm9uZ1Bhc3N3b3JkQDIwMjQ=    # YourStrongPassword@2024
  DB_NAME:     YWJoaV9lamF6X3Nob3A=                 # abhi_ejaz_shop
  JWT_SECRET:  QWJoaUVqYXpKV1RTdXBlclNlY3JldDIwMjQ= # AbhiEjazJWTSuperSecret2024
