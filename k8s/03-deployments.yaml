# ════════════════════════════════════════════════════════════
# Abhi+Ejaz Shop — All Service Deployments + ClusterIP Services
# Replace 262252231763.dkr.ecr.ap-south-1.amazonaws.com with output from:
#   terraform output ecr_registry
# Example: 123456789.dkr.ecr.ap-south-1.amazonaws.com
# ════════════════════════════════════════════════════════════

# ── Shared env helper (referenced by all services) ──────────
# envFrom pulls all keys from ae-secrets and ae-config

---
# ════════════════════════════════════════════════════════════
# PRODUCT SERVICE
# ════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: abhi-ejaz
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
      - name: product-service
        image: 262252231763.dkr.ecr.ap-south-1.amazonaws.com/abhi-ejaz/product-service:latest
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        envFrom:
        - secretRef:
            name: ae-secrets
        - configMapRef:
            name: ae-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: abhi-ejaz
spec:
  selector:
    app: product-service
  ports:
  - port: 3001
    targetPort: 3001
  type: ClusterIP

