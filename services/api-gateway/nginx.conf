worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  sendfile    on;
  tcp_nopush  on;
  tcp_nodelay on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
  gzip_comp_level 6;
  client_max_body_size 10m;

  # ── Upstream services ─────────────────────────────────────
  upstream product_svc {
    server product-service:3001;
    keepalive 32;
  }

  upstream cart_svc {
    server cart-service:3002;
    keepalive 32;
  }

  upstream order_svc {
    server order-service:3003;
    keepalive 32;
  }

  upstream user_svc {
    server user-service:3004;
    keepalive 32;
  }

  upstream frontend_svc {
    server frontend-service:80;
    keepalive 32;
  }

  # ── Rate limiting ─────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

  # ── Main server ───────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options         "SAMEORIGIN"   always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header X-Content-Type-Options  "nosniff"      always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header X-Powered-By            "Abhi+Ejaz Shop" always;

    # ── Gateway health ──────────────────────────────────────
    location /health {
      return 200 '{"status":"gateway_ok","service":"api-gateway","version":"1.0.0"}';
      add_header Content-Type application/json;
    }

    # ── Auth routes ─────────────────────────────────────────
    location ~ ^/api/auth {
      limit_req zone=auth_limit burst=10 nodelay;
      proxy_pass         http://user_svc;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # ── User routes ─────────────────────────────────────────
    location ~ ^/api/user {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass         http://user_svc;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Product / Category / Search routes ──────────────────
    location ~ ^/api/(products|categories|search) {
      limit_req zone=api_limit burst=50 nodelay;
      proxy_pass         http://product_svc;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_pragma;
    }

    # ── Cart routes ─────────────────────────────────────────
    location ~ ^/api/cart {
      limit_req zone=api_limit burst=30 nodelay;
      proxy_pass         http://cart_svc;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Order routes ─────────────────────────────────────────
    location ~ ^/api/orders {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass         http://order_svc;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend page routes (Path-based) ───────────────────
    # These serve the frontend SPA; frontend JS fetches from /api/*
    location / {
      proxy_pass         http://frontend_svc;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Error pages ──────────────────────────────────────────
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
      return 200 '{"error":"Service temporarily unavailable"}';
      add_header Content-Type application/json;
    }
  }
}
